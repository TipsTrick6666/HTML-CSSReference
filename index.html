<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Tra Cứu HTML & CSS (Tiếng Việt)</title>
  <style>
    :root {
      --bg: #fff;
      --surface: #f9f9f9;
      --surface2: #f5f5f5;
      --border: #ddd;
      --border-light: #eee;
      --border-table: #f0f0f0;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-faint: #999;
      --tab-bg: #fff;
      --tab-active-bg: #f0f0f0;
      --tab-active-text: #1a1a1a;
      --tab-active-border: #888;
      --cat-bg: #fff;
      --th-bg: #fff;
      --scroll-border: #ddd;
      --tag-bg: #f5f5f5;
      --toggle-bg: #e5e7eb;
      --toggle-knob: #fff;
    }

    [data-theme="dark"] {
      --bg: #111827;
      --surface: #1f2937;
      --surface2: #374151;
      --border: #374151;
      --border-light: #374151;
      --border-table: #1f2937;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --text-faint: #6b7280;
      --tab-bg: #1f2937;
      --tab-active-bg: #374151;
      --tab-active-text: #f9fafb;
      --tab-active-border: #6b7280;
      --cat-bg: #1f2937;
      --th-bg: #111827;
      --scroll-border: #374151;
      --tag-bg: #374151;
      --toggle-bg: #4f46e5;
      --toggle-knob: #fff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }

    body {
      font-family: system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 1rem
    }

    .wrap {
      padding: 1rem 0;
      max-width: 1100px;
      margin: 0 auto
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--text)
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
      flex-wrap: wrap
    }

    .search-box {
      flex: 1;
      min-width: 180px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--tab-bg);
      color: var(--text)
    }

    .search-box:focus {
      outline: none;
      border-color: var(--tab-active-border)
    }

    .tabs {
      display: flex;
      gap: 6px
    }

    .tab {
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: var(--tab-bg);
      color: var(--text-muted);
      transition: all 0.15s
    }

    .tab.active {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
      border-color: var(--tab-active-border);
      font-weight: 500
    }

    .cat-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px
    }

    .cat-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: var(--cat-bg);
      color: var(--text-muted);
      transition: all 0.15s
    }

    .cat-btn.active {
      background: #dbeafe;
      color: #1e40af;
      border-color: #93c5fd
    }

    [data-theme="dark"] .cat-btn.active {
      background: #1e3a5f;
      color: #93c5fd;
      border-color: #1e40af
    }

    .count {
      font-size: 13px;
      color: var(--text-faint);
      margin-bottom: 8px
    }

    .scroll-wrap {
      max-height: 700px;
      overflow-y: auto;
      border: 1px solid var(--scroll-border);
      border-radius: 12px
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-weight: 500;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-light);
      background: var(--th-bg);
      position: sticky;
      top: 0;
      z-index: 1
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border-table);
      vertical-align: top
    }

    tr:hover td {
      background: var(--surface)
    }

    .tag-cell {
      font-family: monospace;
      font-size: 12px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      display: inline-block;
      white-space: nowrap;
      color: var(--text);
      word-break: break-all
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap
    }

    .bh {
      background: #dbeafe;
      color: #1e40af
    }

    .bs {
      background: #d1fae5;
      color: #065f46
    }

    .bf {
      background: #fee2e2;
      color: #991b1b
    }

    .bm {
      background: #ede9fe;
      color: #5b21b6
    }

    .bt {
      background: #fef3c7;
      color: #92400e
    }

    .bmeta {
      background: #f3f4f6;
      color: #374151
    }

    .bdl {
      background: #fce7f3;
      color: #9d174d
    }

    .bcl {
      background: #d1fae5;
      color: #065f46
    }

    .bca {
      background: #ede9fe;
      color: #5b21b6
    }

    .bco {
      background: #f3f4f6;
      color: #374151
    }

    [data-theme="dark"] .bh {
      background: #1e3a5f;
      color: #93c5fd
    }

    [data-theme="dark"] .bs {
      background: #064e3b;
      color: #6ee7b7
    }

    [data-theme="dark"] .bf {
      background: #4c1d1d;
      color: #fca5a5
    }

    [data-theme="dark"] .bm {
      background: #2e1a5f;
      color: #c4b5fd
    }

    [data-theme="dark"] .bt {
      background: #451a03;
      color: #fcd34d
    }

    [data-theme="dark"] .bmeta {
      background: #374151;
      color: #d1d5db
    }

    [data-theme="dark"] .bdl {
      background: #4a0f2f;
      color: #f9a8d4
    }

    [data-theme="dark"] .bcl {
      background: #064e3b;
      color: #6ee7b7
    }

    [data-theme="dark"] .bca {
      background: #2e1a5f;
      color: #c4b5fd
    }

    [data-theme="dark"] .bco {
      background: #374151;
      color: #d1d5db
    }

    .desc {
      color: var(--text);
      line-height: 1.5
    }

    .subdesc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px
    }

    .no-results {
      text-align: center;
      padding: 2rem;
      color: var(--text-faint);
      font-size: 14px
    }

    /* ===== Dark/Light Toggle Button ===== */
    .theme-toggle {
      position: relative;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }

    .theme-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
      width: 52px;
      height: 28px;
      background: var(--toggle-bg);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.3s ease;
      position: relative;
    }

    .toggle-track .icon-sun,
    .toggle-track .icon-moon {
      font-size: 13px;
      line-height: 1;
      z-index: 1;
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(.4, 0, .2, 1), box-shadow 0.3s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
    }

    .theme-toggle input:checked~.toggle-track .toggle-knob {
      transform: translateX(24px);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>📋 Bảng Tra Cứu HTML & CSS — Tiếng Việt</h1>
    <div class="header">
      <input class="search-box" id="search" placeholder="Tìm tag hoặc thuộc tính... (vd: color, div, margin)"
        oninput="render()">
      <div class="tabs">
        <button class="tab active" onclick="setTab('html',this)">HTML Tags</button>
        <button class="tab" onclick="setTab('css',this)">CSS Properties</button>
      </div>
      <label class="theme-toggle" id="themeToggleLabel" title="Chuyển Dark/Light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <div class="toggle-track">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
          <div class="toggle-knob"></div>
        </div>
      </label>
    </div>
    <div class="cat-filters" id="cats"></div>
    <div class="count" id="count"></div>
    <div class="scroll-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:160px">Tag / Property</th>
            <th style="width:110px">Nhóm</th>
            <th>Mô tả tiếng Việt</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="no-results" id="nores" style="display:none">Không tìm thấy kết quả phù hợp.</div>
    </div>
  </div>

  <script>
    var HTML = [
      { tag: "&lt;!DOCTYPE&gt;", raw: "<!DOCTYPE>", cat: "Meta", bc: "bmeta", desc: "Khai báo loại tài liệu HTML5", sub: "Dòng đầu tiên của mọi file HTML" },
      { tag: "&lt;html&gt;", raw: "<html>", cat: "Cấu trúc", bc: "bs", desc: "Phần tử gốc bao toàn bộ trang web", sub: "Mọi thứ đều nằm trong thẻ này" },
      { tag: "&lt;head&gt;", raw: "<head>", cat: "Cấu trúc", bc: "bs", desc: "Chứa thông tin cấu hình của trang (không hiển thị)", sub: "Đặt title, meta, link CSS vào đây" },
      { tag: "&lt;body&gt;", raw: "<body>", cat: "Cấu trúc", bc: "bs", desc: "Chứa toàn bộ nội dung hiển thị trên trang", sub: "Mọi thứ người dùng thấy đều ở đây" },
      { tag: "&lt;title&gt;", raw: "<title>", cat: "Meta", bc: "bmeta", desc: "Đặt tiêu đề tab trình duyệt", sub: "Hiển thị trên tab và kết quả tìm kiếm Google" },
      { tag: "&lt;meta&gt;", raw: "<meta>", cat: "Meta", bc: "bmeta", desc: "Cung cấp thông tin ẩn về trang (charset, viewport, SEO)", sub: "Ví dụ: charset='UTF-8' hoặc name='description'" },
      { tag: "&lt;link&gt;", raw: "<link>", cat: "Meta", bc: "bmeta", desc: "Liên kết tài nguyên ngoài vào trang (thường là CSS)", sub: "Dùng để nhúng file .css từ bên ngoài" },
      { tag: "&lt;style&gt;", raw: "<style>", cat: "Meta", bc: "bmeta", desc: "Viết CSS trực tiếp trong file HTML", sub: "CSS nội bộ — nên dùng file .css riêng cho dự án lớn" },
      { tag: "&lt;script&gt;", raw: "<script>", cat: "Meta", bc: "bmeta", desc: "Nhúng hoặc liên kết code JavaScript", sub: "Đặt ở cuối body để trang tải nhanh hơn" },
      { tag: "&lt;h1&gt; – &lt;h6&gt;", raw: "<h1>-<h6>", cat: "Văn bản", bc: "bh", desc: "Các cấp tiêu đề từ lớn nhất (h1) đến nhỏ nhất (h6)", sub: "h1 là tiêu đề chính, chỉ dùng 1 lần mỗi trang" },
      { tag: "&lt;p&gt;", raw: "<p>", cat: "Văn bản", bc: "bh", desc: "Đoạn văn bản", sub: "Tự động xuống dòng và có khoảng cách trên/dưới" },
      { tag: "&lt;span&gt;", raw: "<span>", cat: "Văn bản", bc: "bh", desc: "Bao một phần văn bản để tùy chỉnh style (inline)", sub: "Không tạo dòng mới — dùng để tô màu hoặc thay đổi font" },
      { tag: "&lt;strong&gt;", raw: "<strong>", cat: "Văn bản", bc: "bh", desc: "In đậm và nhấn mạnh về ngữ nghĩa", sub: "Máy đọc màn hình nhận biết đây là nội dung quan trọng" },
      { tag: "&lt;em&gt;", raw: "<em>", cat: "Văn bản", bc: "bh", desc: "In nghiêng và nhấn mạnh ngữ nghĩa", sub: "Khác với i — có ý nghĩa nhấn mạnh" },
      { tag: "&lt;b&gt;", raw: "<b>", cat: "Văn bản", bc: "bh", desc: "In đậm thuần túy về hình thức", sub: "Không mang nghĩa nhấn mạnh — chỉ đổi kiểu chữ" },
      { tag: "&lt;i&gt;", raw: "<i>", cat: "Văn bản", bc: "bh", desc: "In nghiêng thuần túy", sub: "Dùng cho tên sách, thuật ngữ kỹ thuật, tiếng nước ngoài" },
      { tag: "&lt;u&gt;", raw: "<u>", cat: "Văn bản", bc: "bh", desc: "Gạch chân văn bản", sub: "Tránh dùng để không nhầm với link" },
      { tag: "&lt;br&gt;", raw: "<br>", cat: "Văn bản", bc: "bh", desc: "Xuống dòng trong cùng đoạn", sub: "Không có thẻ đóng — ép xuống dòng tại vị trí đó" },
      { tag: "&lt;hr&gt;", raw: "<hr>", cat: "Văn bản", bc: "bh", desc: "Vẽ đường kẻ ngang phân cách nội dung", sub: "Dùng để chia phần trong bài viết" },
      { tag: "&lt;pre&gt;", raw: "<pre>", cat: "Văn bản", bc: "bh", desc: "Hiển thị văn bản giữ nguyên khoảng trắng và xuống dòng", sub: "Thường dùng để hiển thị code" },
      { tag: "&lt;code&gt;", raw: "<code>", cat: "Văn bản", bc: "bh", desc: "Hiển thị đoạn code nhỏ inline", sub: "Dùng font monospace — thường kết hợp với pre" },
      { tag: "&lt;blockquote&gt;", raw: "<blockquote>", cat: "Văn bản", bc: "bh", desc: "Trích dẫn một đoạn dài từ nguồn khác", sub: "Thường được thụt lề tự động" },
      { tag: "&lt;q&gt;", raw: "<q>", cat: "Văn bản", bc: "bh", desc: "Trích dẫn ngắn inline (thêm dấu ngoặc kép tự động)", sub: "Trình duyệt tự thêm dấu ngoặc kép xung quanh" },
      { tag: "&lt;abbr&gt;", raw: "<abbr>", cat: "Văn bản", bc: "bh", desc: "Chữ viết tắt kèm giải thích khi hover", sub: "Ví dụ: abbr title='HyperText Markup Language'" },
      { tag: "&lt;mark&gt;", raw: "<mark>", cat: "Văn bản", bc: "bh", desc: "Đánh dấu/highlight văn bản (nền vàng mặc định)", sub: "Như dùng bút dạ quang trên văn bản" },
      { tag: "&lt;sub&gt;", raw: "<sub>", cat: "Văn bản", bc: "bh", desc: "Chữ chỉ số dưới (H₂O)", sub: "" },
      { tag: "&lt;sup&gt;", raw: "<sup>", cat: "Văn bản", bc: "bh", desc: "Chữ chỉ số trên (x²)", sub: "" },
      { tag: "&lt;small&gt;", raw: "<small>", cat: "Văn bản", bc: "bh", desc: "Thu nhỏ chữ — dùng cho ghi chú phụ", sub: "" },
      { tag: "&lt;del&gt;", raw: "<del>", cat: "Văn bản", bc: "bh", desc: "Văn bản bị xóa (gạch ngang giữa)", sub: "Thể hiện nội dung đã bị loại bỏ" },
      { tag: "&lt;ins&gt;", raw: "<ins>", cat: "Văn bản", bc: "bh", desc: "Văn bản được thêm mới (gạch chân)", sub: "Thể hiện nội dung mới được bổ sung" },
      { tag: "&lt;div&gt;", raw: "<div>", cat: "Cấu trúc", bc: "bs", desc: "Hộp khối vô hình để nhóm nội dung", sub: "Phần tử cơ bản nhất để bố cục trang" },
      { tag: "&lt;header&gt;", raw: "<header>", cat: "Cấu trúc", bc: "bs", desc: "Phần đầu trang hoặc đầu section", sub: "Thường chứa logo, nav, tiêu đề" },
      { tag: "&lt;footer&gt;", raw: "<footer>", cat: "Cấu trúc", bc: "bs", desc: "Phần chân trang", sub: "Thường chứa thông tin liên hệ, copyright" },
      { tag: "&lt;nav&gt;", raw: "<nav>", cat: "Cấu trúc", bc: "bs", desc: "Khu vực điều hướng / menu", sub: "Bao các liên kết chuyển trang chính" },
      { tag: "&lt;main&gt;", raw: "<main>", cat: "Cấu trúc", bc: "bs", desc: "Nội dung chính của trang (chỉ dùng 1 lần)", sub: "Không bao header, footer, sidebar" },
      { tag: "&lt;section&gt;", raw: "<section>", cat: "Cấu trúc", bc: "bs", desc: "Một phần/chương trong trang có chủ đề riêng", sub: "Thường có tiêu đề h2/h3 bên trong" },
      { tag: "&lt;article&gt;", raw: "<article>", cat: "Cấu trúc", bc: "bs", desc: "Nội dung độc lập có thể đứng riêng (bài viết, tin tức)", sub: "Như một bài blog hoàn chỉnh" },
      { tag: "&lt;aside&gt;", raw: "<aside>", cat: "Cấu trúc", bc: "bs", desc: "Nội dung phụ bên lề (sidebar, quảng cáo, ghi chú)", sub: "Liên quan nhưng không phải nội dung chính" },
      { tag: "&lt;figure&gt;", raw: "<figure>", cat: "Cấu trúc", bc: "bs", desc: "Bao hình ảnh/biểu đồ cùng chú thích", sub: "" },
      { tag: "&lt;figcaption&gt;", raw: "<figcaption>", cat: "Cấu trúc", bc: "bs", desc: "Chú thích cho hình ảnh trong figure", sub: "" },
      { tag: "&lt;details&gt;", raw: "<details>", cat: "Cấu trúc", bc: "bs", desc: "Hộp nội dung ẩn/hiện khi nhấp vào", sub: "Accordion tự nhiên không cần JavaScript" },
      { tag: "&lt;summary&gt;", raw: "<summary>", cat: "Cấu trúc", bc: "bs", desc: "Tiêu đề hiển thị của details", sub: "Phần người dùng nhấp vào để mở/đóng" },
      { tag: "&lt;dialog&gt;", raw: "<dialog>", cat: "Cấu trúc", bc: "bs", desc: "Hộp thoại/popup native của HTML", sub: "Cần JS để mở: element.showModal()" },
      { tag: "&lt;a&gt;", raw: "<a>", cat: "Liên kết", bc: "bh", desc: "Tạo liên kết đến trang khác hoặc vị trí trong trang", sub: "href bắt buộc — target='_blank' để mở tab mới" },
      { tag: "&lt;img&gt;", raw: "<img>", cat: "Media", bc: "bm", desc: "Nhúng hình ảnh vào trang", sub: "src là đường dẫn ảnh, alt là mô tả thay thế (bắt buộc)" },
      { tag: "&lt;video&gt;", raw: "<video>", cat: "Media", bc: "bm", desc: "Nhúng video vào trang", sub: "Hỗ trợ controls, autoplay, loop, muted" },
      { tag: "&lt;audio&gt;", raw: "<audio>", cat: "Media", bc: "bm", desc: "Nhúng âm thanh vào trang", sub: "" },
      { tag: "&lt;source&gt;", raw: "<source>", cat: "Media", bc: "bm", desc: "Chỉ định nguồn file cho video hoặc audio", sub: "Có thể đặt nhiều định dạng để dự phòng" },
      { tag: "&lt;iframe&gt;", raw: "<iframe>", cat: "Media", bc: "bm", desc: "Nhúng trang web khác vào trong trang hiện tại", sub: "Dùng nhúng YouTube, Google Maps, widget ngoài" },
      { tag: "&lt;canvas&gt;", raw: "<canvas>", cat: "Media", bc: "bm", desc: "Vùng vẽ đồ họa bằng JavaScript", sub: "Dùng cho game, biểu đồ tùy chỉnh, animation" },
      { tag: "&lt;svg&gt;", raw: "<svg>", cat: "Media", bc: "bm", desc: "Vẽ đồ họa vector trực tiếp trong HTML", sub: "Không mờ khi zoom — tốt cho icon và logo" },
      { tag: "&lt;ul&gt;", raw: "<ul>", cat: "Danh sách", bc: "bdl", desc: "Danh sách không thứ tự (bullet point)", sub: "" },

      { tag: "border-collapse", cat: "Bảng", bc: "bco", desc: "Gộp viền bảng (loại khoảng trống giữa ô)", sub: "collapse | separate" },
      { tag: "resize", cat: "Form", bc: "bco", desc: "Cho phép người dùng kéo để thay đổi kích thước", sub: "both | horizontal | vertical | none — thường dùng với textarea" },
      { tag: "content", cat: "Pseudo", bc: "bco", desc: "Thêm nội dung ảo qua ::before hoặc ::after", sub: "Chỉ hoạt động với ::before và ::after" },
    ];

    var tab = 'html', cat = 'Tất cả';

    function setTab(t, el) {
      tab = t; cat = 'Tất cả';
      document.querySelectorAll('.tab').forEach(function (b) { b.classList.remove('active') });
      el.classList.add('active');
      render();
    }

    function setCat(c) { cat = c; render(); }

    function render() {
      var data = tab === 'html' ? HTML : CSS;
      var q = document.getElementById('search').value.toLowerCase().trim();

      var filtered = data.filter(function (d) {
        var matchCat = cat === 'Tất cả' || d.cat === cat;
        var matchQ = !q || d.tag.toLowerCase().includes(q) || (d.raw && d.raw.toLowerCase().includes(q)) || d.desc.toLowerCase().includes(q) || (d.sub && d.sub.toLowerCase().includes(q)) || d.cat.toLowerCase().includes(q);
        return matchCat && matchQ;
      });

      var cats = ['Tất cả'].concat(data.reduce(function (acc, d) { if (acc.indexOf(d.cat) < 0) acc.push(d.cat); return acc; }, []));
      document.getElementById('cats').innerHTML = cats.map(function (c) {
        return '<button class="cat-btn' + (c === cat ? ' active' : '') + '" onclick="setCat(\'' + c + '\')">' + c + '</button>';
      }).join('');

      document.getElementById('tbody').innerHTML = filtered.map(function (d) {
        return '<tr><td><span class="tag-cell">' + d.tag + '</span></td><td><span class="badge ' + d.bc + '">' + d.cat + '</span></td><td><div class="desc">' + d.desc + '</div>' + (d.sub ? '<div class="subdesc">' + d.sub + '</div>' : '') + '</td></tr>';
      }).join('');

      document.getElementById('nores').style.display = filtered.length ? 'none' : 'block';
      document.getElementById('count').textContent = filtered.length + ' ' + (tab === 'html' ? 'thẻ HTML' : 'thuộc tính CSS') + (q || cat !== 'Tất cả' ? ' phù hợp' : ' tổng cộng');
    }

    render();

    // ===== Dark / Light Mode =====
    function toggleTheme() {
      var isDark = document.getElementById('themeToggle').checked;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    (function initTheme() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var useDark = saved === 'dark' || (!saved && prefersDark);
      if (useDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeToggle').checked = true;
      }
    })();
  </script>
</body>
